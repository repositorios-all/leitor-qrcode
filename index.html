<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor QRCode</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>
body { font-family: Arial; padding:20px; text-align:center; }
#video { width:100%; max-width:400px; display:none; }
#cam-ph { margin:20px; }
button { padding:12px; font-size:16px; margin:5px; }
</style>
</head>

<body>

<h2>Leitor QRCode</h2>

<div id="cam-ph">📷 Câmera desligada</div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>

<br>
<button onclick="toggleCam()" id="btn-cam">📷 Abrir Câmera</button>

<script>
let stream = null;
let scanning = false;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

async function toggleCam() {
    if (stream) {
        stopCam();
        return;
    }

    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        video.style.display = "block";
        document.getElementById("cam-ph").style.display = "none";

        await video.play();

        scanning = true;
        scan();

        document.getElementById("btn-cam").textContent = "⏹ Parar";

    } catch (err) {
        alert("Erro ao abrir câmera: " + err.message);
    }
}

function stopCam() {
    scanning = false;

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    stream = null;
    video.style.display = "none";
    document.getElementById("cam-ph").style.display = "block";
    document.getElementById("btn-cam").textContent = "📷 Abrir Câmera";
}

function scan() {
    if (!scanning) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

        const qr = jsQR(img.data, canvas.width, canvas.height);

        if (qr) {
            alert("QR Code detectado:\n" + qr.data);
            stopCam();
            return;
        }
    }

    requestAnimationFrame(scan);
}
</script>

</body>
</html>
