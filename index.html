<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leitor NFC-e</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  :root{
    --blue:#1a6fc4;--blue-dk:#124f90;--blue-lt:#eff6ff;
    --green:#1a8f4e;--green-lt:#f0fdf4;
    --red:#c0392b;--gray:#6b7280;--gray-lt:#f3f4f6;--gray-bd:#d1d5db;
    --text:#111827;--text2:#4b5563;--white:#fff;--bg:#e8edf3;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100dvh;color:var(--text);display:flex;flex-direction:column}
  header{background:var(--white);padding:14px 18px 12px;border-bottom:1px solid var(--gray-bd);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  header h1{font-size:17px;font-weight:700;color:var(--blue)}
  header small{font-size:11px;color:var(--text2);display:block;margin-top:1px}
  .badge{margin-left:auto;background:var(--blue);color:#fff;font-size:13px;font-weight:700;border-radius:20px;padding:4px 12px;min-width:32px;text-align:center}
  main{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px;max-width:540px;width:100%;margin:0 auto}
  .card{background:var(--white);border-radius:14px;border:1px solid var(--gray-bd);overflow:hidden}
  .card-header{padding:14px 16px 10px;border-bottom:1px solid var(--gray-lt);display:flex;align-items:center;gap:8px}
  .ch-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .ch-icon.blue{background:var(--blue-lt)}.ch-icon.green{background:var(--green-lt)}
  .card-header h2{font-size:14px;font-weight:700;color:var(--text)}
  .card-header p{font-size:11px;color:var(--text2);margin-top:1px}
  .card-body{padding:14px 16px}

  #cam-wrap{position:relative;background:#111;border-radius:10px;overflow:hidden;width:100%;aspect-ratio:1/1}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
  #canvas{display:none}
  #cam-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);font-size:13px;text-align:center;padding:20px;gap:8px}
  #cam-ph span{font-size:36px}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  #qr-box{width:62%;aspect-ratio:1/1;border:3px solid rgba(255,255,255,.85);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,.4);display:none;transition:border-color .15s}
  #qr-box.hit{border-color:#4ade80;animation:pop .3s ease}
  @keyframes pop{50%{transform:scale(1.06)}100%{transform:scale(1)}}
  #dbg{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#0f0;font-size:10px;font-family:monospace;padding:3px 8px;text-align:center;display:none}

  /* Botão da Lanterna Superior Direito */
  #btn-torch {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    border: none;
    font-size: 20px;
    display: none; /* Aparece apenas se houver suporte */
    align-items: center;
    justify-content: center;
    z-index: 15;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: background 0.2s, transform 0.1s;
  }
  #btn-torch:active { transform: scale(0.92); }
  #btn-torch.on { background: #f1c40f; color: #000; }

  .btn{padding:12px 8px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s,transform .1s;width:100%}
  .btn:active{transform:scale(.97);opacity:.88}
  .btn.blue{background:var(--blue);color:#fff}
  .btn.gray{background:var(--gray-lt);color:var(--text);border:1px solid var(--gray-bd)}
  .btn.red{background:var(--red);color:#fff}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}

  #status{display:none;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:8px}
  #status.ok{background:var(--green-lt);color:var(--green)}
  #status.err{background:#fee2e2;color:var(--red)}
  #status.info{background:var(--blue-lt);color:var(--blue)}

  #lista-wrap{max-height:220px;overflow-y:auto;border-radius:8px;border:1px solid var(--gray-bd);background:var(--gray-lt)}
  .url-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--gray-bd);font-size:11px;color:var(--text2);word-break:break-all;line-height:1.4}
  .url-item:last-child{border-bottom:none}
  .url-num{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .del-btn{flex-shrink:0;background:none;border:none;color:var(--red);font-size:15px;cursor:pointer;padding:2px 4px}
  #empty-msg{text-align:center;padding:18px;font-size:13px;color:var(--text2)}

  .exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .exp-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--gray-bd);border-radius:10px;background:var(--white);cursor:pointer;font-size:12px;color:var(--text2);font-weight:600}
  .exp-btn:active{background:var(--gray-lt)}
  .exp-btn .ei{font-size:26px}
  #file-in{display:none}

  #method-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--blue-lt);color:var(--blue);display:inline-block;margin-top:2px}
</style>
</head>
<body>
<header>
  <div><h1>Leitor QRCode</h1></div>
  <div class="badge" id="badge">0</div>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <div class="ch-icon blue">📷</div>
      <div>
        <h2>Ler QR Code</h2>
        <p>Aponte a câmera para o QR Code</p>
      </div>
    </div>
    <div class="card-body">
      <div id="status"></div>

      <div id="cam-wrap">
        <div id="cam-ph"><span>📷</span>Câmera ou galeria</div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="overlay"><div id="qr-box"></div></div>
        <button id="btn-torch" onclick="toggleTorch()">🔦</button>
        <div id="dbg"></div>
      </div>

      <div class="btn-row" style="grid-template-columns:1fr">
        <button class="btn blue" id="btn-cam" onclick="toggleCam()">📷 Câmera</button>
      </div>
      <input type="file" id="file-in" accept="image/*" multiple onchange="lerGaleria(this)">
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="ch-icon blue">📋</div>
      <div><h2>URLs capturadas</h2><p id="lista-sub">Nenhuma URL ainda</p></div>
      <button class="btn red" style="margin-left:auto;padding:6px 10px;font-size:12px;border-radius:8px;width:auto" onclick="limpar()">🗑 Limpar</button>
    </div>
    <div class="card-body" style="padding:8px 10px">
      <div id="lista-wrap"><div id="empty-msg">Nenhuma URL capturada.<br>Leia QR codes acima.</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="ch-icon green">📤</div>
      <div><h2>Exportar</h2></div>
    </div>
    <div class="card-body">
      <button class="btn green" onclick="expShare()" style="font-size:15px;padding:16px">📡  Compartilhar qrcode_lido.txt</button>
    </div>
  </div>
</main>

<script>
const urls=[], COOL=2200;
let torchOn=false, torchTrack=null;
let ms=null, raf=null, lastUrl="", lastT=0, detector=null, useDetector=false;

const video=document.getElementById("video");
const canvas=canvasContainer = document.getElementById("canvas");
const ctx=canvas.getContext("2d",{willReadFrequently:true});
const qrBox=document.getElementById("qr-box");
const st=document.getElementById("status");
const dbg=document.getElementById("dbg");
const torchBtn=document.getElementById("btn-torch");

async function initDetector(){
  if("BarcodeDetector" in window){
    try{
      const formats=await BarcodeDetector.getSupportedFormats();
      if(formats.includes("qr_code")){
        detector=new BarcodeDetector({formats:["qr_code"]});
        useDetector=true;
        log("BarcodeDetector nativo ✓");
        return;
      }
    }catch(e){}
  }
  log("jsQR fallback");
}

function log(msg){dbg.style.display="block";dbg.textContent=msg;}

function beep(){
  // Emissão do som de confirmação
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type="sine";o.frequency.value=1046;
    g.gain.setValueAtTime(.45,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.22);
    o.start();o.stop(ac.currentTime+.22);
  }catch(e){}
  
  // Vibração ativa do aparelho (Pulso limpo de 200ms)
  try{ 
    if(navigator.vibrate) {
      navigator.vibrate(200); 
    } 
  }catch(e){}
}

async function toggleTorch(){
  if(!torchTrack) return;
  torchOn=!torchOn;
  try{
    await torchTrack.applyConstraints({advanced:[{torch:torchOn}]});
    if(torchOn){
      torchBtn.classList.add("on");
      torchBtn.textContent="💡";
    }else{
      torchBtn.classList.remove("on");
      torchBtn.textContent="🔦";
    }
  }catch(e){
    torchOn=!torchOn; 
    log("Erro lanterna: "+e.message);
  }
}

function status(msg,tipo){
  st.style.display="flex";st.className=tipo;st.textContent=msg;
  if(tipo!=="info")setTimeout(()=>st.style.display="none",3500);
}

function renderLista(){
  const w=document.getElementById("lista-wrap");
  const s=document.getElementById("lista-sub");
  document.getElementById("badge").textContent=urls.length;
  s.textContent=urls.length===0?"Nenhuma URL ainda":`${urls.length} URL(s)`;
  w.innerHTML="";
  if(!urls.length){w.innerHTML='<div id="empty-msg">Nenhuma URL capturada.<br>Leia QR codes acima.</div>';return;}
  urls.forEach((u,i)=>{
    const d=document.createElement("div");d.className="url-item";
    d.innerHTML=`<span class="url-num">${i+1}</span><span style="flex:1">${u}</span><button class="del-btn" onclick="del(${i})">✕</button>`;
    w.appendChild(d);
  });
}

function del(i){urls.splice(i,1);renderLista();}
function limpar(){if(!urls.length)return;if(!confirm(`Remover ${urls.length} URL(s)?`))return;urls.length=0;renderLista();}

function add(url){
  url=url.trim();
  if(!url)return;
  const now=Date.now();
  if(url===lastUrl&&now-lastT<COOL)return;
  lastUrl=url;lastT=now;
  if(!urls.includes(url)){
    urls.push(url);renderLista();beep();
    qrBox.classList.add("hit");setTimeout(()=>qrBox.classList.remove("hit"),400);
    status(`✅ Capturada! Total: ${urls.length}`,"ok");
  }else{
    status("⚠️ Já registrada","info");
  }
}

async function scanNativo(){
  if(!ms)return;
  if(video.readyState<2){raf=requestAnimationFrame(scanNativo);return;}
  try{
    const codes=await detector.detect(video);
    if(codes.length)add(codes[0].rawValue);
  }catch(e){log("det err:"+e.message);}
  raf=requestAnimationFrame(scanNativo);
}

function scanJsQR(){
  if(!ms)return;
  if(video.readyState<2){log("aguardando vídeo...");raf=requestAnimationFrame(scanJsQR);return;}
  const W=video.videoWidth,H=video.videoHeight;
  if(!W||!H){raf=requestAnimationFrame(scanJsQR);return;}
  const scale=Math.min(1,480/Math.max(W,H));
  const w=Math.round(W*scale),h=Math.round(H*scale);
  if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
  ctx.drawImage(video,0,0,w,h);
  let data;
  try{data=ctx.getImageData(0,0,w,h);}
  catch(e){
    log("⚠️ canvas bloqueado — use galeria ou HTTPS");
    status("⚠️ Câmera só funciona via HTTPS ou servidor local.<br>Use o botão Galeria para imagens.","err");
    pararCam();return;
  }
  const qr=jsQR(data.data,w,h,{inversionAttempts:"dontInvert"});
  if(qr)add(qr.data);
  log(`jsQR ${w}×${h} | ${urls.length} lidas`);
  raf=requestAnimationFrame(scanJsQR);
}

async function toggleCam(){
  if(ms){pararCam();return;}
  const btn=document.getElementById("btn-cam");
  btn.textContent="⏳ Iniciando...";btn.disabled=true;
  try{
    ms=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"},width:{ideal:640},height:{ideal:640}},
      audio:false
    });
    video.srcObject=ms;
    await new Promise(r=>{video.onloadedmetadata=r;});
    await video.play();
    document.getElementById("cam-ph").style.display="none";
    video.style.display="block";
    qrBox.style.display="block";
    btn.textContent="⏹ Parar";btn.disabled=false;
    log(`cam ${video.videoWidth}×${video.videoHeight} | método: ${useDetector?"nativo":"jsQR"}`);
    
    // Configura e verifica suporte à lanterna na faixa de vídeo ativa
    const track=ms.getVideoTracks()[0];
    const caps=track.getCapabilities?track.getCapabilities():{};
    if(caps.torch){
      torchTrack=track;
      torchOn=false;
      torchBtn.style.display="flex";
      torchBtn.classList.remove("on");
      torchBtn.textContent="🔦";
    }else{
      torchTrack=null;
      torchBtn.style.display="none";
    }

    if(useDetector) raf=requestAnimationFrame(scanNativo);
    else            raf=requestAnimationFrame(scanJsQR);
  }catch(err){
    ms=null;btn.textContent="📷 Câmera";btn.disabled=false;
    const msgs={NotAllowedError:"❌ Permissão negada",NotFoundError:"❌ Câmera não encontrada",OverconstrainedError:"❌ Resolução incompatível"};
    status(msgs[err.name]||"❌ Erro: "+err.message,"err");
    log(err.name+": "+err.message);
  }
}

function pararCam(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(ms){ms.getTracks().forEach(t=>t.stop());ms=null;}
  video.srcObject=null;video.style.display="none";
  document.getElementById("cam-ph").style.display="flex";
  qrBox.style.display="none";
  
  // Reseta estado do botão da lanterna
  torchBtn.style.display="none";
  torchBtn.classList.remove("on");
  torchBtn.textContent="🔦";
  torchTrack=null; 
  torchOn=false;

  document.getElementById("btn-cam").textContent="📷 Câmera";
  document.getElementById("btn-cam").disabled=false;
  dbg.style.display="none";st.style.display="none";
}

async function lerGaleria(input){
  const files=[...input.files];if(!files.length)return;
  let ok=0,err=0;
  for(const f of files){
    const r=await new Promise(res=>{
      const img=new Image();
      img.onload=async()=>{
        if(useDetector){
          try{
            const codes=await detector.detect(img);
            if(codes.length){add(codes[0].rawValue);ok++;res(true);return;}
          }catch(e){}
        }
        for(const s of[.5,.75,1]){
          const c=document.createElement("canvas");
          c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
          c.getContext("2d",{willReadFrequently:true}).drawImage(img,0,0,c.width,c.height);
          let d;
          try{d=c.getContext("2d").getImageData(0,0,c.width,c.height);}catch(e){break;}
          const qr=jsQR(d.data,d.width,d.height,{inversionAttempts:"attemptBoth"});
          if(qr){add(qr.data);ok++;res(true);return;}
        }
        err++;res(false);
      };
      img.onerror=()=>{err++;res(false);};
      img.src=URL.createObjectURL(f);
    });
  }
  if(ok>0&&!err)      status(`✅ ${ok} QR(s) lido(s)`,"ok");
  else if(ok>0)       status(`✅ ${ok} lido(s) · ${err} sem QR`,"ok");
  else                status("❌ Nenhum QR encontrado","err");
  input.value="";
}

const txt=()=>urls.join("\n");

function expLocal(){
  if(!urls.length){alert("Nenhuma URL.");return;}
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([txt()],{type:"text/plain"}));
  a.download="qrcode_lido.txt";a.click();URL.revokeObjectURL(a.href);
}

async function expShare(){
  if(!urls.length){alert("Nenhuma URL.");return;}
  if(navigator.share){
    try{
      const file=new File([txt()],"qrcode_lido.txt",{type:"text/plain"});
      if(navigator.canShare?.({files:[file]})) await navigator.share({files:[file]});
      else await navigator.share({files:[file]});
      return;
    }catch(e){if(e.name==="AbortError")return;}
  }
  expLocal();
}

initDetector().then(renderLista);
</script>
</body>
</html>
